name: todo_app
description: A senior-level Flutter Todo app with Clean Architecture, Riverpod, and Isar.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Database
  isar: ^3.1.0+1
#  isar_flutter_libs: ^3.1.0+1
  xxf_isar_flutter_libs: ^3.1.0+2
  path_provider: ^2.1.3

  # Navigation
  go_router: ^13.2.0

  # Image
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1
  flutter_image_compress: ^2.2.0

  # Models / Utilities
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  uuid: ^4.4.0
  intl: ^0.19.0
  path: ^1.9.0

  # UI
  flutter_animate: ^4.5.0
  percent_indicator: ^4.2.3
  gap: ^3.0.1
  shimmer: ^3.0.0

  # Backup
  share_plus: ^9.0.0
  file_picker: ^8.0.3
  archive: ^3.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  isar_generator: ^3.1.0+1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/



